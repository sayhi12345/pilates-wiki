<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>凱迪拉克動作索引</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">STOTT PILATES Cadillac Wiki</p>
        <h1>凱迪拉克動作索引</h1>
      </div>
      <div class="header-stats" aria-label="資料統計">
        <span id="exerciseCount">0 動作</span>
        <span id="activeFilter">全部肌群</span>
      </div>
    </header>

    <main class="app-shell">
      <aside class="sidebar" aria-label="索引">
        <section class="panel">
          <div class="panel-title">肌群</div>
          <div id="muscleFilters" class="button-stack"></div>
        </section>

        <section class="panel">
          <div class="panel-title">Tags</div>
          <div id="tagFilters" class="tag-cloud"></div>
        </section>
      </aside>

      <section class="list-panel" aria-label="動作列表">
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="搜尋動作、器械、tag" autocomplete="off">
          <select id="sourceFilter" aria-label="來源">
            <option value="all">全部</option>
            <option value="beginner">初級</option>
            <option value="intermediate_advanced">中高階</option>
          </select>
        </div>
        <div id="activeTags" class="active-tags"></div>
        <div id="mobileTagFilters" class="mobile-tag-cloud" aria-label="Tags"></div>
        <div id="exerciseList" class="exercise-list"></div>
      </section>

      <section class="detail-panel" aria-label="動作詳情">
        <article id="exerciseDetail" class="detail"></article>
      </section>
    </main>

    <div id="imageLightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="圖片預覽" hidden>
      <button id="lightboxClose" class="lightbox-close" type="button" aria-label="關閉圖片預覽">×</button>
      <button id="lightboxPrev" class="lightbox-nav lightbox-nav-prev" type="button" aria-label="上一張圖片">&lsaquo;</button>
      <div class="lightbox-content">
        <img id="lightboxImage" class="lightbox-image" alt="">
        <p id="lightboxCaption" class="lightbox-caption"></p>
      </div>
      <button id="lightboxNext" class="lightbox-nav lightbox-nav-next" type="button" aria-label="下一張圖片">&rsaquo;</button>
    </div>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
